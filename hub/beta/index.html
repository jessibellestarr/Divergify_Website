<!doctype html>
<html lang="en" data-mode="default" data-privacy="off" data-motion="normal">

  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <form name="beta-feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="beta-feedback" />
      <input name="bot-field" />

      <input name="email" />
      <input name="title" />
      <input name="area" />

      <input name="founding_offer" />
      <input name="app_url" />
      <input name="user_agent" />

    <noscript>
      <main style="max-width: 980px; margin: 16px auto; padding: 16px; border: 1px solid #5e5c6b; border-radius: 16px;">
        <h1 style="margin: 0 0 8px;">Divergify Non-JS Mode</h1>
        <p style="margin: 0 0 12px;">
          JavaScript is off, so the interactive planner cannot run. Manual fallback:
        </p>
        <ol style="margin: 0; padding-left: 20px;">
          <li>Write one anchor task.</li>
          <li>Set a 5-10 minute timer.</li>
          <li>When the timer ends, choose stop or one more sprint.</li>
        </ol>
        <p style="margin: 12px 0 0;">Enable JavaScript to restore the full planner, focus, habits, and sidekicks.</p>
      </main>
    </noscript>
    <div id="root"></div>
  </body>
